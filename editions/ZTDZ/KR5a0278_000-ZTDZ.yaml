body:
  text: 金液還丹百問訣重七昔李光玄者渤海人也少孤連氣僮僕數人家積珠金巨萬光玄年方弱冠乃逐鄉人舟船往來於青社淮浙之間貨易巡歷後却過海遇一道人同在舟中朝夕與光玄言話巡歷新羅渤海日本諸國光玄因謂道人曰中國豈無好事耶爭得過海遊歷道人曰我於世上喻若浮雲心無他事是以過海光玄異之因更日夜與道人攀言論道人乃謂光玄曰郎君家更有何資產光玄曰余少孤兄弟僮僕數人家財巨萬道人曰既家資如此何得遠涉風波更求其利漫漫大海浩浩長波一旦傾危蟲魚得便此何智也光玄答曰我非爲財涉此風波余暗思人世皆如夢幻朝霞曉露豈可乆長石火電光瞥然則滅人生若此寧可思惟舊塚未乾新墳相次壘金遍地全不關身積玉倚天豈能留命所以經涉海浪直入外方意在尋訪眞人問求達士欲有何術可救生前及到外方又無所遇不逢英哲遂且歸鄉誠意如斯非爲財貨道人曰君方年少只合愛戀榮華如此聰明深爲大器矣莫愁仙分只要自修必得其眞耳光玄聞道人所說啓而言曰光玄蚯蚓之質豈有成龍斥鷃之形爭能似鳳非敢望於大悟只希睹於小知儻高人不以余凡愚少垂誨示終身佩荷豈敢負恩道人曰爾求延年保命耶求金丹大藥耶光玄答曰非敢揀擇但高人知者可望垂誨終身奉持道人乃曰金丹大藥未遇至人保命延年即知軌則君若好之吾無恡矣光玄答曰余少愚昧何敢勝當玄妙之門道人曰夫道在身更無外事爾能遠離房室屏棄世縁枕石潄泉祛煩就靜元氣不散可至長生夫元氣者是身中混元之氣是人之根基念住則氣停神行則氣散是以至人住息屏是非絶顧盻喘息不遊於鼻外存思常注於丹田若三田得實千年可保更或納新吐故潄液咽津悉是延年之門皆爲固身之道古歌曰氣是添年藥精爲續命芝世上謾忙并謾走不能求己更求誰此之謂也但能旦夕不倦依而行之必獲延年長生之道也復問光玄曰見吾髭髮儀形否光玄曰高人髭鬢有異紺髮童顏朱脣皓齒道人曰行此道遂得如斯余今已逾百歲不識疾病汝豈知我乎光玄再拜謝曰少年小子獲聞大道豈非高人垂念指示祕關終身保持佩服恩德後至東岸下船道人自欲遊新羅渤海告别光玄光玄乃涕泗交并奉辭道人歸還故里光玄達家之後一心奉其至道不顧繁華遂却離鄉重遊滄海駐居雲島之中十有餘年依高人之指的弘持至道乃得氣力百倍儀形異常因被往日同船之人號光玄爲海客光玄忽於一日夜中思惟世上人間更有出世之門金液之道若只住居此處無由得逢遂便抛離雲島漸届中華巡歷名山尋遊五嶽瞻禮聖境懇志訪尋專求達士乃初遊泰嶽次歷諸山後於己酉年中八月三日因至中嶽嵩高山少室洞巖僧寺之中止泊十餘日後即緩步南登看翫巖谷行可五六里間忽於路側松林之下遇一人形神半老手中携一竹杖杖頭懸掛三瓢短褐長巾於人稍異乃問光玄曰爾從何方而來至此光玄曰家住渤海人也駐居雲島頗歷歲年近自海外而來尋遊名山勝境今日方到此地又問光玄曰人生各有途轍爾獨遊名山訪何事也光玄曰人生雖有途轍唯余棄辭財產每笑榮貴不戀繁華唯求妙道至眞乃至於此又問光玄曰求道已來還得幾年得道多少也光玄答曰二十餘年海内海外無所不到又問光玄曰二十年中有何所遇光玄答曰二紀年中曾於船中遇一道人令光玄保養精氣導引四肢依而行之以成其道又問光玄曰既得此道更欲何求光玄答曰竊聞神仙更有金液妙道還丹至術慮恐虚度年華是以遍尋山嶽又問光玄曰所求金液之道曾遇人否光玄答曰訪求二十餘年不逢達者老人乃微笑再問光玄曰識吾已否光玄曰未識仁者老人曰我是玄壽先生又問光玄曰爾何姓何名光玄答曰姓李名光玄老人又笑曰我號玄壽爾名光玄與吾相符我知人矣仲尼所謂起予者商也又語光玄曰爾求金液之道爲當提拔世人爲當只爲自己光玄曰訪尋金液之道一爲己身二爲提拔世途有分之者便即相携非直爲己老人曰子誠意如此即可相傳若爲一身神仙非許我有此道汝可受之光玄既聞涕泣再拜云神仙妙道豈可輕傳天地必嗔鬼神必責願將微命參從先生數十年間辛勤日夜然後願垂憫念賜乃幽玄老人曰不然子若不仁假使一生辛勤此道亦不可付吾見子仙骨有彰聖基純熟今相遇我與爾際會之時但專志誠聽吾所說先生乃旋放竹杖在於一邊坐於石上前面更有一石乃語光玄曰子坐聽吾至道光玄啓言曰先生奉傳至道之門光玄爭敢輒坐先生曰子但坐縁至道玄遠盡此一日言論猶恐未終豈可令子乆立聽之但坐聽吾所說光玄再拜跪而聽之先生曰夫還丹者且非别藥眞一爲基鉛汞相依黄芽是本乃可成也光玄起再拜而問先生曰以見世上道人皆說黄芽未知至理黄芽者將何物之所爲以何藥而製造先生曰鉛出鉛中方爲至寳汞傳金汞鉛汞造氣乃號黄芽子不見古歌曰黄芽鉛汞造陰㲉含陽華不得黄芽理還丹應路賒世人鍊凡藥盡認鉛黄花黄花是死物那得到仙家黄芽非在藥内象取精華若到黄芽地金銀徒爾誇此之謂也光玄曰竊見金石五相類中云鉛有大毒爭堪成就至藥先生曰鉛雖有毒蓋爲世人不解取用之如藥中巴豆之類非無毒也若解使用即理萬病鉛亦是也陶植篇云鉛中有金金中有寳見寳别寳賢人得道寧修鉛中金不鍊金中寳此非世間之鉛也世人直下用鉛希求黄芽萬無得一蓋不識其鉛也光玄曰鉛有二耶先生曰鉛非有二譬如養子若割父母身上之肉内於母腹之中而望孩子生孩子生應難也若離父母孩子自何而生古歌曰鼎鼎元無鼎藥藥元無藥用鉛不用鉛須向鉛中作黄芽是鉛去鉛萬里黄芽非鉛從鉛而始鉛爲牙父牙是鉛子子隱母胞母隱子胎知白守黑神明自來此之謂也直至諸經唯讚鉛之功能也若捨其鉛如棄父母而求孩子也古歌曰莫瓌我鉛令我命全莫瓌我車令我還家鉛斷河車所作無功鉛絶河車所作無出又曰玄生因金公巍巍立始終又曰一物含五彩永作仙人禄又陶植篇云一者水數爲五行之始色稟北方之位包含五行修之得合道了契自然故能生天生地爲牝爲牡然後還日精於月窟結精華於無中能生紫氣之精潜與眞合符非神仙莫能窺也世人不解用之遂致差之毫釐失之千里可不明矣古歌曰用鉛不用鉛須向鉛中作恰到用鉛時用鉛還是錯又云用鉛不用鉛鉛是舊丹田此用不棄而解用陰陽得序悟之則得只在鉛中爾細研究之也又元陽子歌曰眞陰眞陽是其道只在目前何遠討凡流歲歲鍊神丹忽見青黄自言好志士應須求法則勿使心神虚敗耗但能求取眞黄芽人若服之壽無老此可知也光玄曰竊見世人云朱砂水銀是黄芽何理也先生曰此非道人之言也且朱砂水銀者無定性自無身形陰自不生女自無孕故也李棲蟾云朱砂水銀同處二女終不相知自立既難安何得成大藥夫黄芽者坎離相孕金水相生男冠女笄牝牡相得從無入有陰動陽交方可得成契於至理故陰眞君歌曰北方正氣爲河車東陽甲乙成金砂兩情含養同一體朱雀調運生金花金花生天地寳人會此言成至道此可知也光玄曰又見世人或以金爲黄芽銀爲黄芽研朱粉銀爲黄芽生銀爲黄芽鉛鍊鉛枯鉛等爲黄芽或以密陀僧爲黄芽是何理也先生曰此並非也諸類皆是有質之物頑滯之徒鍊之即色悴形枯燒之即塵飛土變枯骨而粉畢竟無成蓋謂孤陰寡陽爭同至藥服之則灼人五臟餌之乃促彼生年豈可類於黄芽叶於大道夫黄芽者鉛汞合體金木相並龍虎相交水火相制推情合性以魄隨魂成爲還返之因明於呼吸之理力得陰交陽孕母在子全得天地之精誠授混元之大道也古歌曰金不露體木不呈形又言丹砂木精得金乃並又曰束身歛魄充虎飢虎來啖食生體脂此甚明也光玄曰黄芽既云鉛汞所造金水相生愚意尚迷未曉伏願先生再垂指的先生曰譬如人間種樹世上良田果子初先犂蒔耕墾次選好地及彼良時仍賴風雨調勾節候催促年終稼穡盡獲收成黄芽之因亦復如是合和鉛汞配合坎離水火相仍時候周足自然變化無有比倫黄芽若成大道易矣古歌曰鉛汞牙鉛汞牙同三花採我氣結成砂初聞日運火加輪五彩入神華曾爲使道無邪三者備出是仙家此可知也光玄曰黄芽既得知其根本至藥如何得成再乞先生一垂指示先生曰至藥唯用五行更無雜物若有諸類不成至藥古歌曰捉取東方龍配與西白虎更將南朱雀後會之玄武就中玄處玄莫失中央路此可知也此之五行是鉛汞本類乃得成丹若有非類即不成也譬如一家父母夫婦無有别人鉛汞五行亦復如是制伏成藥骨肉精氣血脉皆全方堪服餌古歌云何言金木水火土留身保神是龍虎學人不識五行精强認他人爲父母木主氣兮骨主虎血主水兮肉象土不死之道在離宫會得五行金有主五行須是水銀親殊質不堪爲伴侣又賀蘭求大士歌曰青龍起白虎卧玄武飛朱雀坐黄龍中央自結褁母憐子子憐我爐中結成雲一朵服餌刀圭無不可此之是也光玄曰大藥雖是龍虎制服五行精氣成藥餌服之時最要何物爲丸先生曰成藥之日是一味水銀神水之胎作紫金之粉色含五彩以表五行成身號曰金液還丹太古神仙皆同一法古歌曰水銀一味成仙藥如使留傳伏火難若遇河車成紫粉一時化作金液丹金丹正法本非赤水銀一味獨幽玄刀圭點化將爲驗服者不死作眞仙又歌曰却取抽成汞還燒遺作砂胎中受五行月足見黄芽迷途不可見對面隔天涯若到河車地只此是仙家此可明也光玄曰伏火水銀若成至藥自古已來亦有朱砂水銀伏火者不少因何服餌皆不延年及將點化又無所用此何謂也先生曰此皆不得神仙之妙術不按仙經之理不依五行製造不得日月精華或用諸類相和或於至眞違遠縱得千斤伏火亦與瓦石一般非惟點化無堪亦致服食夭人壽矣故王眞人傳云古有兄弟二人將水銀一斤於陽山谷之中鍊燒三年伏火如紅玻璃之色言是至藥兄弟各服半斤六月須著綿衣行又要人抶策此希延壽返有墮身之灾豈非藥類不同方術錯悮此可爲驗切在求其眞若得眞源萬不一失光玄曰既黄芽是大藥之根本是五行所成並曉其源何知出世未委幾多分兩燒制起自何時而得成就伏願先生慈悲再希指示先生曰神仙至藥分兩爭無大道金丹燒時有節不依爐之法象亦且鼎有乾坤火從子離須明卦兆復自離而至亥始見光華亦同子在母胎直須日足雞居卵内要待時分分兩則二八同居節候乃一星周帀方可龍興雲雨虎嘯巖前定延世上之年不是人間之物古歌曰二八姹女十六鉛精陽生起火陰盡須停星辰周帀至藥通靈又陶隱居望江南詞云長生藥本是五行作子午二門開卯酉四時運火合乾坤龍虎自相吞此之謂也光玄曰大丹既曉法度實爲萬生有縁此時獲遇又見諸經訣云日魂月魄白虎青龍丹砂河車眞鉛眞汞名字不少疑惑人心未審其中誰爲正號願先生一說以釋千疑令後人得知仙路有登塵寰得免先生曰多般名號只是一途日魂即是陽精月魄還同陰體青龍是木豈離東方白虎爲金還居西面河車金液是仙家得意之名眞汞眞鉛乃達士當時之號但令消息何用遲疑不越五行更無别理光玄曰又見黄帝陰符經云金丹之術百數其要妙在神水華池未知神水華池是何物也華池之外金丹更有成無乞垂一指永釋疑心也先生曰華池之外金丹無成任是百數千般妄爲虚設若是華池之内至妙至神故黄帝遇此昇眞馬明因兹得道華池之理亦在五行前章之中具陳仔細故元陽子歌曰神水華池世所希流傳不許俗人知多將世上凡鉛汞相似令教人不疑光玄曰又見諸經云三五與一天地至精未知此言是何事也先生曰前以備陳今再問三五者亦是五行正數且非别類本無凡物爾更宜尋究必達根原耳不見古歌曰陰坎徒迷一陽離五彩形不知三所以備抱木之靈鍊藥須通訣玄關諳古經瓊丹君若就天駕五雲軿光玄曰世上諸藥何止數萬般唯金液還丹即延生保壽乃至昇眞是何理也先生曰爾之愚鈍猶不知之聽吾細說且世間之人無不禀於五行而生至於心肝脾肺腎豈棄陰陽五行還丹者燒五行之精氣含萬象之神光得紫金之妙流津液之名服之者豈不保固四肢堅牢五藏自然長生有地去世成因事在目前迷人但執古歌曰金砂入五内霧散若風雨薰蒸達四肢顏色悦澤好老翁復丁壯耆嫗成姹女髮白復再黑齒落更重生號曰眞人子度世免死厄此方可知也石藥者亦屬五行不録一體自然也如生服之即有毒損人伏火又即同瓦礫唯可醫小病寧將此比並大丹事理曉然眞源不昧也草藥者亦隨四時凋變自不固於雪霜方味相和亦只理其風濕豈比大丹至藥眞道深遠須辨是非可以知其深淺光玄曰金丹大藥服之長壽乃至昇天未審世間更將何用先生曰迷人金液還丹豈無使用此丹一年滿足十月周圓開爐而紫粉成金啓鼎而黄芽發耀包含五彩聚集百靈先將點制於水銀立成黄金爲驗服食之後永固筋骸濟命濟家且非虚說古歌曰丹砂丹砂濟命濟家能濟我命能濟我家又陶隱居望江南云十月滿開鼎一團紅數片殘雪含五彩解胎神水響玲瓏氣復異香穠此得成至寳之謂也光玄曰水銀除此藥制伏得成金外更有何藥擒之得成至寳先生曰水銀除黄芽至藥之外諸般藥類寧制於他光玄曰何以諸藥制伏不得先生曰水銀者乃天地之至精五金之魂魄流利爲性染雜無因故俗士云水銀無假阿魏非眞此明眞理故知諸物不可入也黄芽者體是水銀感五行之精受正陽之氣年周月足骨立神全水銀被制之有何不可也陰符經注云飛鼠斷猿河車伏汞若有雜物無因得成又歌曰河上姹女靈而最神見火即飛不染垢塵鬼匿龍隱莫知所存將欲制之黄芽爲根此可知也光玄曰先生不聞凡末夫指幽玄金液之道盡知龍虎之門頓悟幾年海上空悲萬里之波今日塵中忽見三清之境雖知仙路堪憫世人今欲再有啓陳更希先生指路庶令迷昧盡達眞源是弟子之誠深願矣先生曰爾之姓字已在於丹臺我道幽玄悉無祕恡但希來問即可分明莫抱疑情虚度一世光玄曰竊恐世人不曉鉛汞不識五行將四黄以制水銀使八石用爲至藥硇礬雄雌之類無不遍尋磁砒膽緑之徒悉將入用指神符霜於黑錫認聖無知作青鹽火鍛百迴水飛千遍忽三年守鼎五載臨爐運火即山谷空虚苦心則形神枯槁都無所就但怨神方今啓問求諸石藥五礬之中終有至事制得水銀已否伏願先生慈悲特爲開曉先生曰世間之事乃至纖毫未有不因其理制伏相依種類相取而成事也若乃窮諸理例得彼類形何事不成何因不立周易所謂水流濕火就燥雲從龍風從虎聖人作而萬物睹此理例相依也即有水能共脂乳相通入油膠漆相須雪霜同固此形類相取也可不明矣夫水銀者是金之魂魄本五金之精華與鉛同根與水共體若以五行相孕金水相生得氣傳華方乃得成至藥將制水銀萬變千通世無比類故陶植篇云金爲水母母隱子胎水爲金子子隱母胞水者金之子子藏母腹此言金水自相含孕藴櫝於母中因造化而生又子繼父體爲母立兆基此言砂産於金汞流於子以金養汞繼體而榮道合自然事歸於至妙不可不思之也若用礬石之藥雜類之徒則金體全乖祖宗並失還返無由而得金水無由而生可謂雀鷂同巢鼠猫共穴將膠補釜以漆塗瘡但恣虚老百年萬無一得之也古歌曰世人好假不好眞競將石藥和水銀姹女化歸煙霧散曾青磁石自相親硇礬膽緑傾家産多爲疏狂枉作塵若遇神仙談至理終知白首永無因此可知也且藥石者大約七十二件多至一百餘般古之至人盡辨酸鹹苦澀著其經論或擣研使用治世人之諸疾或修鍊合和辟人間之邪沴無關大事得至長生假饒别得玄方窮極制度亦是暫留髭髮豈能乆固筋骸世間迷昧之徒囂薄之輩謬傳方術誣誷神仙礬石欲同鉛汞或以柳搥研合或以桑葉相和醋煮蜜蒸之時不論遍數水飛酒飛之日動占時光言固濟則鐵石非堅說覆籍乃尋常莫匹極至三年滿足一鼎灰塵却云鷄犬來衝致得龍蛇變去殊不知己之非理但將怨恨於眞仙如此之流世間滿目更有用盡寰中衆石海内諸礬銅精鐵精石緑土緑罄竭資金皆無所就情意稍迷心神益亂不信仙方寧遠豈知大道無煩謂靈丹不在此間言至藥生於海外便向波斯國内而求白礬紫礬或向回紇域中尋訪金剛玉屑動經多歲惑說萬途縱饒覔得將來亦無用處愁髮因兹變白苦心爲此歸泉如此皆爲不曉藥之情性不知藥之類聚且礬共石不與金同水銀既是金魂石藥又如何入用夫至藥者紫金爲五彩成身成金可因一體五彩恰同五臟又見古歌曰金可作命可保金不作徒自悮此不虚傳矣大藥既成金液變體元是水銀何用礬石之徒此得形類相須前云至理人不知之上山求魚入海網免此則倒見可不悲哉光玄曰大藥既是金液成形礬石又不相入切見世人多假五金爲櫃伏制水銀亦是經歲經年千機萬巧皆無所成多是虚費工夫是何理也先生曰五金者是人間之質物亦與至藥不同黄芽篇中具陳爾仔細研尋術有幽祕之道又有玄微皆須口授親傳方可成丹轉理切見世人妄憑泛說專按古方亂制水銀欲成至藥殊不知五行含孕如婦女之懷胎鉛汞相須若晨雞之抱卵至眞妙道通變無窮毫釐有差通變失序故陶植望江南云還丹術切要經手傳若信故方終自誤顛來倒去倒來顛不得怨神仙又菩薩蠻詞云家家盡有長生藥時人取用皆差錯氣候若飛沈問君何處尋眼看猶不識誤向鉛中覔此物没黄芽徒勞歲月賒細思此理眞爲足矣光玄曰先生云四黄八石全無大道之理不與水銀合同又見龍光黄一味纔鎔成汁立制水銀成砂是何理也先生曰汝未知之聽吾細說水銀者正陰之體硫黄者假陽之形正陰被假陽之制暫變身形終無所住若遇正陽伏制終始相依此陰陽之大理也又硫黄是礬石之液礬者乃鐵之津華磁石乃鐵之母朱砂磁石伏制硫黄立成紫粉此一根也硫黄既爲鐵之孫胤水銀本是金之精魂二氣雖暫相合終無成事但旦細窮理路兼乃可見根源光玄曰先生所言諸礬制伏水銀不得亦不與水銀相同又見緑礬共青鹽相和制得水銀成粉成霜是何理也先生曰水銀者金之魂魄緑礬者乃是鐵之津華體五金即二氣同根議鉛汞則鐵銅疏遠是以暫制水銀成粉却再燒之復其本源終無成遂恰同不制光玄曰礬既如此青鹽因何與礬同入水銀爲用也先生曰鹽於水銀無以相類只是礬制水銀之時鹽助其色别無其功亦如飛燒砒黄上覆其鹽即得色白若非鹽覆其色不白此之一例也斯爲小事非關大丹爾但究窮永除疑慮矣光玄曰先生所言鉛汞五行是大丹之根本諸礬石藥並不相干深悟至眞盡其大理又見世人多有廣積童便再淋再漉或煮或煎燔取其霜澄瀘其滓言是五行之本至藥之根或將服食或轉制砂汞是何理也先生曰此是迷人所爲之謬事也其童便是人所食之物而成更有何物若有長生保固之道人之日食便合延年更又何勞煎取查滓修鍊之士妄以此物爲之欲其延年惑矣故迷徒不知至理縱然煎得只成粉霜也大共鹽花一般爭可變通得成至藥細窮至理勿信凡流三島不遥九天非遠光玄曰又見世人多採桑柴灰煎鍊言是至藥根本同制朱砂水銀曾青詰問所由却言不見陰眞君歌云龍居震位當六八乃四十八是桑字也引歌曰採乎蠶食之前鍊於火化之後又樊曹元緒之龜降聖人之質此是大藥之根更非别藥此理如何再請先生一說之也先生曰大丹之本前章具明更無虚謬桑柴灰者亦是迷人之所作愚人之所傳遞互相承一無實矣且陰眞君歌曰龍居震位當六八虎數元生在一宫四十八者此是大藥分之數亦如是方位之名非桑字也凡流不達其理妄認虚無似鹿逐於陽光猿探水月終何所得虚用心神大藥之者純是五行更無别類礬石相雜猶尚不成桑紫之徒可知遠矣故參同契云孤免不乳馬燕雀不生鳳此之謂也光玄曰又見世人多取竈突中煙云是木之至精配在青龍之位便引元陽子歌曰要識丹砂是木精移來西位與金并迷人何處尋龍虎恍惚之間是杳冥言是此也復覓鄜州井鹽或以太陰玄精配爲白虎之象引歌曰鹿邑相附力三口四十相乘復相守中田可養十一人横目在下視左右言是眞龍眞虎之道大丹之心此理如何望垂指示先生曰至眞妙道匪遥時人不見大謬之辭易識愚者長迷故愚知相互玉石不等良可悲爾可足憫哉夫至藥者是滑利之物變化之身上通仙籍下延人壽得之者五行自曉迷之者萬象長懸金丹一成貧病永失且煙臨玄精之類者是世間之死物與瓦礫之無殊燒之則血脉不生鍊之則精神轉竭將何變化得成大丹理在目前時人不見故元陽子歌曰眞龍眞虎是眞親所言木精西位顯陰陽互養之靈豈言煙曠之徒也元陽子素是達人且非昧士豈得將達人之語迷頑鈍之心虚妄亦然錯亂甚矣夫龍虎者是還丹之體鉛汞之心神仙悉明經書不謬故金丹銘云丹砂眞位元非赤四季排來在南宅位屬南方丙丁火故說其形赤抽取砂中水銀屬東方甲乙木其形乃青龍之象黑鉛本性元非黑懷玉内抱含五德配屬北方壬癸水其形黑抽取鉛中精氣配屬西方庚辛金其形白乃白虎之象也又歌曰五行不順行龍從火裏生五行顛倒術虎從水裏出又金丹職賦云火東旋而爲龍水西轉而成虎又李栖蟾歌曰太陰在南宅太陽向北居火之木曰汞水之金曰鉛制在中宫器以類助相成陰來去發陽龍虎爲證驗神丹龍虎有靈豈以煙曠之徒玄精之類比之得同至藥也再三思究萬無一差勿信愚人有惑眞的光玄曰先生所說還丹之道已盡幽玄竊聞昔淮南王更鍊秋石而成至藥服食升天未知秋石是何物也又見丹經多說聖無知之號世人云是青鹽不知是否伏願先生勿恡玄理也先生曰淮南王劉安所鍊秋石之事是大丹更無别藥還如一物乃有數名聖人臨時亦復如是縁金虎者是丹之本色凝白位屬西方主秋故得其號亦復黄芽河車一類也聖無知者亦是丹之心體鉛汞之深門當五行制伏之時自生肌骨及萬象包羅之曰血脉皆蒙仙人尋眞不知聖人思之不測故號聖無知也更非别途豈是青鹽迷人錯誤之矣光玄曰先生所云藥及五行成體萬象全身鉛汞相因虎龍含孕餌之則堅牢五藏潤澤皮膚用之則制汞成金回貧濟物是何理路名曰大還神丹復是何神仙初始知此妙道先生曰金者水之子汞者金之魄與五行相生是一根歷萬載而不能合體有陵陽子者本是太初眞哲上古高人知此根源祕爲妙道故將南對北用西對東配此四方不違中道一年運火十月開爐七返無虧九還周足及龍飛魂返虎伏魄歸故號曰紫金之妙訣七返之神丹此之謂也古歌曰九還七返三五一龍虎相交入神室灰池炎爍天地精金液還丹功乃畢光玄曰先生開闢天路大朗玄門陳不死之方示長生之術盡知眞僞備見是非今者更有少疑又須啓問切見世上之人多求草藥將結水銀指嶺南不是遠途言塞北只同户外遍求藂卉散採芳枝赤芹萵苣之徒盈諸兜籠章柳瓦松之類盡滿篋箱或擣末油煎水煮多時或用地膽杵自然之汁採田公草則洗了除根人莧與馬莧相兼龍膽共免絲共使未成砂子早望黄金如此之流如麻似蟻至使資財散蕩役心力以荒狂究竟無成却怨天而恨地未知此事到底如何願先生細賜開悟免懷迷昧枉費心神先生曰人雖一類乃有愚智萬般所禀不同性情各異智者暗通於心内愚人不見於掌中亦如雲氣生而上天瓦礫成而在地雲氣乃抑之而不住瓦礫乃舉之而不升愚知已然改换安可且水銀者借陰之氣玄水之精過萬歲而方成形與五金而爲魂魄重之則重於金體潔乃不許塵侵悉在目前有何難睹夫草藥者春生夏長秋落冬殘枝葉豈堅根莖不乆制之則成水沬燒之則本是灰塵若將結制水銀可謂天懸地隔足認無知之輩苟利之徒枉惑時人言有成事居河北則指三吴有草在嶺南則云兩蜀得成盡是虚傳皆非實理相承既遠訛謬堪悲智者則乃自明愚者無因得達光玄曰蒙先生之所說得先生之所言松樗之色顯然玉石之形迥爾迷情盡破滯意俄消未知草結水銀畢竟有否先生曰龜毛長短免角纖麤光玄曰草結既同龜毛免角元來是無又見世人多說三黄櫃中以草結砂子罨之成金此何謂也先生曰三黄四黄者體與水銀不同又是飛走之藥何以制得水銀成金若生將制伏見火即爲焰若得伏火而與瓦礫何殊别無變化之門母既狀同瓦礫豈可令子成金銀如此非屬至理也若是三黄櫃中必有成事亦如烏生烏兒鳳生鳳子螻蟻亦然蟲魚並是又不見相之時三黄櫃中須是草結砂子何如金是銀本成了非夫其體以不合於至理契彼丹經都是無成故指草結砂子之類也且草從古至今只是鬼名有同水上求塵鑽冰覓火令蟬乳鳳使鶴懷蛇石藥尚與水銀不同草藥何因而得相入遞傳虚語妄使搜尋嶺北嶺南海内海外巧論枝葉廣說醋甜到底至終並爲虚僞智者聞而心曉愚者執之髮白謂覓能舞之蛇將求解飛之鱉可不嘆歟光玄曰三黄之櫃草結水銀已見根源備知仔細又見世人多求母結砂子欲望成金銀皆乃罄竭資財虚然白首終無成就却致貧寒未知此事究竟如何先生曰此非好道之人皆是貪財之輩夫道者希夷爲本寂寞爲基節嗜慾以居山去貪愛而隱谷存神養氣餐栢飡霞方乃漸得清凉洞達眞境且金銀者世上之物濟於浮生有分者不求自來無分者求之不得散之即彰於德積之必害於身石崇因而滅家梁冀爲兹覆族要之則但多途營運百計希求自然獲濟貧寒無至饑闕豈在須求丹結砂子制造金銀苟利何益與道玄遠且神仙之士眞境之人以藥制成黄金豈在須用母結砂子也神仙道者視榮貴如同泥土金寳之徒非所愛耶驗於變化此用表至藥之功劇及得將來亦濟其窮苦非自沽名貪縱嗜慾以滅身心凡俗之流不同仙者之見其母砂子欲成金銀心昧可知情迷可悉且母砂子燒之不住煆之即飛燒煆纔終一無所有與生之汞相較無殊必若有術乾得直是無母何爲此事著在目前可不思究先生却問光玄曰無母砂子者何因由却得其號光玄曰只是水銀結成並無五金諸藥滓故號無母砂子先生大笑曰要必成金寳具有母砂子何妨也縁母是金銀汞歸母體豈非理也爾何故須要無母砂子也則世間朱砂靈砂粉霜輕粉及諸般感氣之類亦是水銀結成無有五金諸藥滓者可不同乎無母砂子爾今記所說書吾所言遍各指陳得免時人捕影矣光玄曰神符大道金液至門定德長生必登仙路誠不疑矣未知世間諸石草藥還有延年出世之道否先生曰爾又至問聽吾細言諸石藥亦有延年出世之道不見十洲記神仙傳言極有此事出世也若遇靈芝挺秀朱草呈妍黄精白术之英採諸幽谷赤箭茯苓之瑞出彼高巖桃花杏仁栢葉松子悉堪修事皆在經書亦有煮白石以充飢鍊玄霜而度世此皆塵埃外士山野奇人或絶粒數年或修眞多載名字早登於仙籍精華不散於三田故餌服有靈草名有效此可謂内眞外應表裏功全豈不延年豈不度世且凡流之者不知至道不曉眞詮貪愛不休苟求無已爲積玉可延於算壽爲堆金可駐於年華唯恣驕矜常營奢侈無一日不閑滋味無一時不愛綺羅七竅長流三田不固任是萬般靈藥服餌徒然直饒九轉神丹也應無益如此之輩憫之不及爾但依吾所教必獲大道矣光玄又曰金華大道神水玄門得之者白鹿可乘西遊崑嶺遇之者青牛可駕東看扶桑同天地之乆長見江河之變改豈期偶因遊翫獲遇眞流不以凡昧之人盡賜幽玄之術不差毫釐之細匪謬纖髮之遺尹君昔授眞文誠爲可祖太上之生徐甲同是深恩負荷莫勝顧盼無已今欲收拾藥類備辦資縁只向此山研窮燒制未知達士深意如何再乞指陳願依尊誨先生曰此妙道世上希奇爾能盡知切須保祕勿與非人言論勿與非道交遊稍忽輕泄天機輕傳下類不唯殃爾七祖亦乃滅爾一身切在祕藏莫同常事此山雖是名嶽且近大都今值兵革方興干戈已作揺動四海踐踏中原此山多戎兵往復之鄉黎庶潜竄之地那堪燒鍊至藥豈可修制神丹吴越極有深山江浙不少福地或羅浮茅嶺或廬山天台目下並安亦復無事乃是衆聖依栖之地群賢止泊之方爾可選彼深幽就其佳勝修持大藥燒制金丹必獲無魔定登天路吾之所說悉無謬言爾便遵吾勿懷疑慮光玄曰弟子一箇微生二儀外物學調氣焉未柔每於三田不遇玄珠幾許虚度百歲豈謂忽逢眞哲大决疑情三清之路潜通金液之功畢見恩深渤澥荷重丘山未知微命將何所報先生曰爾之有際會於吾吾有幽玄悉付於汝吾見人事擾擾世路忙忙不知薤露之身但貪榮禄豈覺風燈之命唯務生涯如此之流吾足憫矣爾但將吾所論録吾所傳流布世間行於世上提携有分接引群情便是報吾之恩餘無所託爾乃亦要精專修鍊早陟雲衢壺中之日月全殊洞裏之乾坤頗别莫於人世乆戀繁華聽之愼之遠諸非類光玄聞已兩淚再拜立在一邊先生曰爾於海上曾飲玄酒已否光玄曰凡流未曾遭遇先生乃於竹杖上取一瓢令光玄於澗泉汲水光玄乃携瓢下山於石泉之中取水將到先生前先生接得接下一半於地只餘一半便取藥一丸如菉豆許作紅紫之色投入瓢中以樹葉塞口坐於樹石之上良乆成酒紅紫馨香撲鼻有異於人間之酒先生自飲一盞所有盡令光玄飲之飲訖頓覺神情爽朗肢節寬舒不並常時身同象外乃再拜感謝先生訖而立先生曰時已暮矣汝且自歸所止吾縁勞倦欲往後山只在峯南近水有一草菴便是吾住止爾若無事但來相訪光玄曰弟子無事欲送先生歸去所止之處得否先生曰吾已困矣計汝亦疲倦但且歸去明日過山覔來言訖便携竹杖南去行步如飛雖有一徑以通望先生若片雲之渡嶺瞥然不見光玄悵望却歸山寺之中一夜不眠乞得曉色纔分尋其往路更無疑滯直過峯南徑路全無松蘿蔽日澗水與哀猿不辨白雲共飛鳥相隨不睹一人空瞻南仞光玄乃知先生非居凡世豈是常人悵望再三悲思莫及便迴所止寫先生所言之祕論流布世間用求同好上士君子幸宜思究之矣金液還丹百問訣
